<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2008 669" width="2008" height="669" role="img" aria-labelledby="title desc">
  <title id="title">Triadic reciprocal determinism diagram</title>
  <desc id="desc">Person, Environment, and Behaviour connected by reciprocal arrows.</desc>
  <defs>
    <linearGradient id="nodeFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d3f7a"/>
      <stop offset="46%" stop-color="#102659"/>
      <stop offset="100%" stop-color="#071736"/>
    </linearGradient>
    <linearGradient id="nodeStroke" x1="0" x2="1">
      <stop offset="0%" stop-color="#69c6ff"/>
      <stop offset="52%" stop-color="#b7dcff"/>
      <stop offset="100%" stop-color="#4da7ff"/>
    </linearGradient>
    <linearGradient id="arrowBlue" x1="0" x2="1">
      <stop offset="0%" stop-color="#77d2ff"/>
      <stop offset="55%" stop-color="#8bc7ff"/>
      <stop offset="100%" stop-color="#54a7ff"/>
    </linearGradient>
    <linearGradient id="arrowPurple" x1="0" x2="1">
      <stop offset="0%" stop-color="#c18aff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <filter id="cardGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#39a9ff" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.52"/>
    </filter>
    <filter id="arrowGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#61c8ff" flood-opacity="0.95"/>
    </filter>
    <filter id="purpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a974ff" flood-opacity="0.95"/>
    </filter>
    <marker id="arrowHeadBlue" viewBox="0 0 32 32" refX="29" refY="16" markerWidth="38" markerHeight="38" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 32 16 L 0 32 z" fill="#78cfff"/>
    </marker>
    <marker id="arrowHeadPurple" viewBox="0 0 32 32" refX="29" refY="16" markerWidth="32" markerHeight="32" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 32 16 L 0 32 z" fill="#b38cff"/>
    </marker>
  </defs>

  <rect width="2008" height="669" fill="#101010"/>
  <rect x="96" y="64" width="1816" height="540" rx="72" fill="#02091f"/>

  <path d="M 395 401 C 450 245 545 190 706 151"
        fill="none" stroke="url(#arrowBlue)" stroke-width="9" stroke-linecap="round"
        marker-end="url(#arrowHeadBlue)" filter="url(#arrowGlow)"/>
  <path d="M 1306 153 C 1468 191 1561 247 1613 401"
        fill="none" stroke="url(#arrowBlue)" stroke-width="9" stroke-linecap="round"
        marker-end="url(#arrowHeadBlue)" filter="url(#arrowGlow)"/>
  <path d="M 1315 495 C 1102 551 905 551 692 495"
        fill="none" stroke="url(#arrowBlue)" stroke-width="9" stroke-linecap="round"
        marker-end="url(#arrowHeadBlue)" filter="url(#arrowGlow)"/>

  <path d="M 1082 280 C 1118 399 870 404 926 280"
        fill="none" stroke="url(#arrowPurple)" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="18 17" marker-end="url(#arrowHeadPurple)" filter="url(#purpleGlow)"/>
  <path d="M 1770 403 C 1719 232 1517 91 1314 136"
        fill="none" stroke="url(#arrowPurple)" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="18 17" marker-end="url(#arrowHeadPurple)" filter="url(#purpleGlow)"/>

  <g filter="url(#cardGlow)">
    <rect x="704" y="104" width="600" height="176" rx="28" fill="url(#nodeFill)" stroke="url(#nodeStroke)" stroke-width="4"/>
    <rect x="150" y="397" width="550" height="164" rx="28" fill="url(#nodeFill)" stroke="url(#nodeStroke)" stroke-width="4"/>
    <rect x="1308" y="397" width="550" height="164" rx="28" fill="url(#nodeFill)" stroke="url(#nodeStroke)" stroke-width="4"/>
  </g>

  <g font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="middle" fill="#ffffff">
    <text x="1004" y="175" font-size="60" font-weight="800" letter-spacing="0">Person</text>
    <text x="1004" y="220" font-size="29" font-weight="520" fill="#d7e8ff">model state + constraints</text>

    <text x="425" y="475" font-size="58" font-weight="800" letter-spacing="0">Environment</text>
    <text x="425" y="520" font-size="29" font-weight="520" fill="#d7e8ff">user input</text>

    <text x="1583" y="475" font-size="58" font-weight="800" letter-spacing="0">Behaviour</text>
    <text x="1583" y="520" font-size="29" font-weight="520" fill="#d7e8ff">generated response</text>
  </g>
</svg>
